name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build extension (required for integration tests)
        run: npm run build:extension

      - name: Install VS Code headless dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            libnspr4 libnss3 \
            libatk1.0-0 libatk-bridge2.0-0 \
            libgtk-3-0 libglib2.0-0 \
            libgbm1 libxkbcommon0 \
            libasound2t64

      - name: Integration tests
        run: xvfb-run -a npm run test:integration

      - name: Build
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package extension
        run: mkdir -p releases && npm run vsce -- package --no-dependencies -o releases/kanban-markdown-${{ steps.version.outputs.VERSION }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "releases/*.vsix"
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npx ovsx publish releases/*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
