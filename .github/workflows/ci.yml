name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build extension (required for integration tests)
        run: npm run build:extension

      - name: Install VS Code headless dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            libnspr4 libnss3 \
            libatk1.0-0 libatk-bridge2.0-0 \
            libgtk-3-0 libglib2.0-0 \
            libgbm1 libxkbcommon0 \
            libasound2t64

      - name: Integration tests
        run: xvfb-run -a npm run test:integration

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanban-markdown-${{ github.sha }}
          path: "releases/*.vsix"
